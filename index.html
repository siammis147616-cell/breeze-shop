<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breeze | Premium Decants</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-section, .order-tracking, .login-overlay { display: none; }
        body.admin-mode .admin-section { display: block; }
        body.admin-mode .shop-section, body.admin-mode .order-tracking { display: none; }
        body.track-mode .order-tracking { display: block; }
        body.track-mode .shop-section, body.track-mode .admin-section { display: none; }
        .active-filter { text-decoration: underline; font-weight: 900; color: #000; }
        #custom-cart { transform: translateX(100%); transition: 0.3s ease-in-out; z-index: 1000; }
        #custom-cart.open { transform: translateX(0); }
        .login-overlay.show { display: flex; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900">

    <!-- ADMIN LOGIN MODAL -->
    <div id="login-modal" class="login-overlay">
        <div class="bg-white p-8 rounded shadow-2xl w-80 text-center border-t-4 border-black">
            <h2 class="font-serif italic text-2xl mb-2">Breeze Admin</h2>
            <input type="text" id="adm-user" placeholder="Username" class="w-full border p-2 mb-2 text-sm outline-none">
            <input type="password" id="adm-pass" placeholder="Password" class="w-full border p-2 mb-4 text-sm outline-none">
            <button onclick="attemptLogin()" class="w-full bg-black text-white py-3 font-bold text-xs uppercase tracking-widest">Login</button>
            <button onclick="closeLogin()" class="text-[10px] mt-4 uppercase underline text-stone-400 cursor-pointer block w-full">Back to Shop</button>
        </div>
    </div>

    <!-- HEADER -->
    <header class="bg-white p-4 border-b sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <h1 class="text-2xl font-serif italic cursor-pointer" onclick="resetShop()">Breeze.</h1>
        <div class="flex gap-2">
            <button onclick="showSection('track')" class="text-[9px] bg-white px-2 py-2 uppercase font-bold border rounded">Track Order</button>
            <button onclick="openLogin()" class="text-[9px] bg-stone-100 px-2 py-2 uppercase font-bold border rounded">Admin</button>
            <button onclick="toggleCart()" class="bg-black text-white px-3 py-2 text-[9px] uppercase font-bold shop-section rounded">Bag (<span id="cart-count">0</span>)</button>
        </div>
    </header>

    <!-- SHOP FRONT -->
    <main class="shop-section max-w-[1600px] mx-auto p-4">
        <div class="mb-6 space-y-4 text-center">
            <input type="text" id="globalSearch" oninput="handleSearch()" placeholder="Search names or brands..." class="w-full max-w-2xl mx-auto block p-4 border rounded-full text-xs outline-none shadow-sm focus:ring-1 ring-black">
            
            <div class="flex gap-4 text-[10px] uppercase font-bold border-b pb-2 overflow-x-auto justify-center scrollbar-hide">
                <button onclick="setSeason('all')" class="active-filter filter-link" id="f-all">All Seasons</button>
                <button onclick="setSeason('Summer')" class="filter-link" id="f-Summer">Summer</button>
                <button onclick="setSeason('Winter')" class="filter-link" id="f-Winter">Winter</button>
                <button onclick="setSeason('Spring')" class="filter-link" id="f-Spring">Spring</button>
                <button onclick="setSeason('Autumn')" class="filter-link" id="f-Autumn">Autumn</button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-8">
            <aside class="hidden md:block w-48 shrink-0">
                <h3 class="text-[10px] uppercase font-black mb-4 border-b pb-2 tracking-widest text-stone-400">Brands</h3>
                <ul class="text-[11px] space-y-3 uppercase text-stone-500" id="brand-menu"></ul>
            </aside>
            <div id="shop-grid" class="flex-1 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
        </div>
    </main>

    <!-- BAG / CHECKOUT -->
    <div id="custom-cart" class="fixed right-0 top-0 h-full w-full sm:w-[450px] bg-white shadow-2xl p-6 flex flex-col overflow-y-auto">
        <div class="flex justify-between items-center border-b pb-4 mb-4">
            <h2 class="font-bold uppercase text-xs tracking-widest">Your Bag</h2>
            <button onclick="toggleCart()" class="text-xs uppercase font-bold text-stone-400">✕ Close</button>
        </div>
        
        <div id="cart-items" class="space-y-4 mb-6"></div>
        
        <div class="space-y-3 border-t pt-4 text-xs">
            <p class="text-[9px] uppercase font-bold text-stone-400">Delivery Information</p>
            <input type="text" id="c-name" placeholder="Full Name *" class="w-full border p-2 outline-none">
            <input type="tel" id="c-phone" placeholder="Phone Number (11 Digits) *" class="w-full border p-2 outline-none">
            
            <div class="grid grid-cols-2 gap-2">
                <select id="c-div" class="border p-2 bg-white"><option value="">Select Division *</option></select>
                <select id="c-dist" class="border p-2 bg-white"><option value="">Select District *</option></select>
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="c-road" placeholder="Road Name/No *" class="w-full border p-2 outline-none">
                <input type="text" id="c-house" placeholder="House/Flat No *" class="w-full border p-2 outline-none">
            </div>
            
            <textarea id="c-details" placeholder="Additional Delivery Details (Optional)" class="w-full border p-2 h-16 outline-none"></textarea>
            
            <p class="text-[9px] uppercase font-bold text-stone-400 mt-4">Payment (Send Money to 01725805104)</p>
            <select id="c-pay" class="w-full border p-2 bg-white">
                <option value="">Select Payment Method *</option>
                <option value="bkash">bKash</option>
                <option value="nagad">Nagad</option>
            </select>
            <input type="text" id="c-trx" placeholder="Transaction ID *" class="w-full border p-2 uppercase outline-none">

            <div class="border-t pt-4 space-y-1">
                <div class="flex justify-between"><span>Subtotal:</span><span>৳<span id="sub-total">0</span></span></div>
                <div class="flex justify-between"><span>Delivery:</span><span>৳100</span></div>
                <div class="flex justify-between font-bold text-lg"><span>Total:</span><span>৳<span id="grand-total">0</span></span></div>
            </div>
            
            <button onclick="placeOrder()" class="w-full bg-black text-white py-4 text-[10px] uppercase font-bold tracking-widest hover:bg-stone-800">Place Order</button>
        </div>
    </div>

    <!-- TRACKING SECTION -->
    <main class="order-tracking max-w-3xl mx-auto p-6">
        <h2 class="text-xl font-bold mb-6 uppercase text-center tracking-widest">Order History</h2>
        <div id="customer-order-list" class="space-y-4"></div>
    </main>

    <!-- ADMIN PANEL -->
    <main class="admin-section max-w-[1600px] mx-auto p-6">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <h2 class="text-2xl font-black uppercase text-blue-600">Admin Control</h2>
            <button onclick="location.reload()" class="bg-red-500 text-white px-4 py-2 text-[10px] font-bold uppercase rounded">Logout</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 border shadow-sm h-fit sticky top-24">
                <h3 class="font-black uppercase text-xs mb-4">Manage Inventory</h3>
                <form id="pForm" class="space-y-3 text-[11px]">
                    <input type="text" id="name" placeholder="Perfume Name" class="w-full border p-2" required>
                    <input type="text" id="brand" placeholder="Brand" class="w-full border p-2" required>
                    <textarea id="notes" placeholder="Notes" class="w-full border p-2 h-12"></textarea>
                    <select id="season" class="w-full border p-2 bg-white">
                        <option>Summer</option><option>Winter</option><option>Spring</option><option>Autumn</option><option>All</option>
                    </select>
                    <div class="grid grid-cols-3 gap-1">
                        <input type="number" id="p1" placeholder="1ml Price"><input type="number" id="p3" placeholder="3ml Price"><input type="number" id="p5" placeholder="5ml Price">
                        <input type="number" id="p10" placeholder="10ml Price"><input type="number" id="p15" placeholder="15ml Price"><input type="number" id="p30" placeholder="30ml Price">
                    </div>
                    <input type="file" id="fileIn" class="w-full border p-1">
                    <input type="hidden" id="imgUrl">
                    <button type="submit" class="w-full bg-black text-white py-3 font-bold uppercase mt-2">Save Product</button>
                </form>
                <div class="mt-8 border-t pt-4">
                    <input type="text" id="inventorySearch" oninput="renderAdminProducts()" placeholder="Search Inventory..." class="w-full border p-2 text-[10px] mb-2">
                    <div id="admin-product-list" class="space-y-1 h-48 overflow-y-auto scrollbar-hide"></div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h3 class="font-black uppercase text-xs mb-4 underline">Live Orders & Management</h3>
                <div id="admin-order-list" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://pcxwmgjsbvlyyedhjujc.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_UaeY_Kqvy5EZsDoL3nmuDQ_SW_0HrwS';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const divs = ["Dhaka", "Chattogram", "Rajshahi", "Khulna", "Barishal", "Sylhet", "Rangpur", "Mymensingh"];
        const dists = ["Dhaka", "Gazipur", "Narayanganj", "Cumilla", "Feni", "Sylhet", "Bogura", "Chattogram", "Noakhali"];

        let inventory = []; let orders = []; let filteredItems = []; let cart = [];

        async function loadData() {
            const { data: pData } = await _supabase.from('perfumes').select('*');
            const { data: oData } = await _supabase.from('orders').select('*').order('created_at', { ascending: false });
            inventory = pData || []; orders = oData || []; filteredItems = inventory;
            renderShop(); renderAdmin(); renderBrandMenu();
        }

        function renderShop(items = filteredItems) {
            document.getElementById('shop-grid').innerHTML = items.map(p => {
                const sz = Object.entries(p.prices || {}).filter(([k,v]) => v && v > 0);
                return `
                <div class="bg-white border p-2 shadow-sm rounded">
                    <img src="${p.img}" class="w-full h-40 object-cover bg-stone-50 mb-2 rounded">
                    <p class="text-[8px] uppercase text-stone-400 font-black">${p.brand}</p>
                    <h2 class="font-bold text-[11px] truncate">${p.name}</h2>
                    <select id="size-${p.id}" class="text-[10px] border mb-2 w-full p-1 bg-white">
                        ${sz.map(([ml, pr]) => `<option value="${pr}">${ml.replace('p','')}ml - ৳${pr}</option>`).join('')}
                    </select>
                    <button onclick="addToCart('${p.id}')" class="w-full bg-black text-white py-2 text-[9px] font-black uppercase">Add to Bag</button>
                </div>`;
            }).join('');
        }

        function addToCart(id) {
            const p = inventory.find(x => x.id === id); 
            const sel = document.getElementById(`size-${id}`);
            const sizeLabel = sel.options[sel.selectedIndex].text.split(' - ')[0];
            const price = parseFloat(sel.value);
            const existing = cart.find(i => i.id === id && i.size === sizeLabel);
            if(existing) { existing.qty++; } else { cart.push({ id, name: p.name, size: sizeLabel, price: price, qty: 1, img: p.img }); }
            updateCartUI();
            if(!document.getElementById('custom-cart').classList.contains('open')) toggleCart();
        }

        function changeQty(index, delta) {
            cart[index].qty += delta;
            if(cart[index].qty < 1) cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.qty, 0);
            let sub = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center text-[10px] border-b pb-2">
                    <div class="flex gap-2 items-center">
                        <img src="${item.img}" class="w-10 h-10 object-cover rounded">
                        <div><p class="font-bold">${item.name}</p><p class="text-stone-400">${item.size}</p></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${i}, -1)" class="px-2 border bg-stone-50">-</button>
                        <span>${item.qty}</span>
                        <button onclick="changeQty(${i}, 1)" class="px-2 border bg-stone-50">+</button>
                    </div>
                </div>`).join('');
            document.getElementById('sub-total').innerText = sub;
            document.getElementById('grand-total').innerText = cart.length > 0 ? sub + 100 : 0;
        }

        async function placeOrder() {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            const div = document.getElementById('c-div').value;
            const dist = document.getElementById('c-dist').value;
            const trx = document.getElementById('c-trx').value;
            const pay = document.getElementById('c-pay').value;

            if(!name || phone.length !== 11 || !div || !dist || !trx || cart.length === 0) return alert("Fill all * fields and add 1 item!");

            const oid = `BRZ-${Date.now().toString().slice(-6)}`;
            const address = `House: ${document.getElementById('c-house').value}, Road: ${document.getElementById('c-road').value}, ${dist}, ${div}`;
            
            const o = {
                orderID: oid, customer: name, phone: phone, address: address,
                items: [...cart], total: parseFloat(document.getElementById('grand-total').innerText),
                status: 'Order Received', orderDate: new Date().toLocaleString(),
                isPaid: false, isRefunded: false, adminNote: `Payment: ${pay} | Trx: ${trx}`
            };

            const { error } = await _supabase.from('orders').insert([o]);
            if(!error) { alert("Order Placed: " + oid); cart = []; updateCartUI(); toggleCart(); loadData(); showSection('track'); }
        }

        // --- ADMIN ORDER VIEW (WITH ITEM DETAILS, PAID, REFUNDED, NOTES) ---
        function renderAdmin() {
            renderAdminProducts();
            document.getElementById('admin-order-list').innerHTML = orders.map(o => {
                // Formatting the items list
                const itemDetails = o.items.map(i => `${i.name} (${i.size}) x${i.qty}`).join(', ');
                
                return `
                <div class="bg-white p-4 border text-[10px] shadow-sm rounded-lg space-y-3">
                    <div class="flex justify-between border-b pb-2 font-black">
                        <span class="text-blue-600">ORDER ID: ${o.orderID}</span>
                        <span>${o.orderDate}</span>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1">
                            <p><b>Items:</b> <span class="text-stone-600">${itemDetails}</span></p>
                            <p><b>Amount:</b> <span class="font-bold">৳${o.total}</span></p>
                            <p><b>Customer:</b> ${o.customer} | ${o.phone}</p>
                            <p><b>Address:</b> ${o.address}</p>
                            <p class="text-blue-800 bg-blue-50 p-1 inline-block mt-1 uppercase font-bold">${o.adminNote || 'No Payment Note'}</p>
                        </div>
                        
                        <div class="flex flex-col gap-2 border-l pl-4">
                            <p class="uppercase font-bold text-stone-400 text-[8px]">Order Management</p>
                            <select onchange="updateOrder('${o.orderID}', {status: this.value})" class="border p-1 font-bold bg-stone-50">
                                <option ${o.status==='Order Received'?'selected':''}>Order Received</option>
                                <option ${o.status==='Dispatched'?'selected':''}>Dispatched</option>
                                <option ${o.status==='Complete'?'selected':''}>Complete</option>
                                <option ${o.status==='Cancelled'?'selected':''}>Cancelled</option>
                                <option ${o.status==='Refunded'?'selected':''}>Refunded</option>
                            </select>
                            
                            <div class="flex items-center gap-4 py-1">
                                <label class="flex items-center gap-1 cursor-pointer">
                                    <input type="checkbox" ${o.isPaid?'checked':''} onchange="updateOrder('${o.orderID}', {isPaid: this.checked})"> 
                                    <span class="${o.isPaid?'text-green-600 font-bold':'text-stone-400'}">PAID</span>
                                </label>
                                <label class="flex items-center gap-1 cursor-pointer">
                                    <input type="checkbox" ${o.isRefunded?'checked':''} onchange="updateOrder('${o.orderID}', {isRefunded: this.checked})"> 
                                    <span class="${o.isRefunded?'text-red-600 font-bold':'text-stone-400'}">REFUNDED</span>
                                </label>
                            </div>
                            
                            <input type="text" placeholder="Internal Note (e.g. Broken Cap)" value="${o.shortNote || ''}" 
                                onblur="updateOrder('${o.orderID}', {shortNote: this.value})" class="border p-1 text-[9px] outline-none italic">
                        </div>
                    </div>
                    <button onclick="deleteOrder('${o.orderID}')" class="text-red-300 text-[8px] uppercase hover:text-red-600">Delete Permanently</button>
                </div>`;
            }).join('');
        }

        // --- CUSTOMER TRACKING VIEW (ITEM DETAILS & STATUS) ---
       function renderCustomerOrders() {
        document.getElementById('customer-order-list').innerHTML = orders.map(o => `
            <div class="bg-white p-4 border text-[11px] rounded shadow-sm space-y-2">
                <div class="flex justify-between items-start font-bold">
                    <div>
                        <p class="text-[12px]">ID: ${o.orderID}</p>
                        <p class="text-stone-400 font-normal text-[10px]">${o.orderDate}</p>
                    </div>
                    <span class="text-blue-600 uppercase font-black tracking-tight">${o.status}</span>
                </div>
                
                <div class="border-t pt-2 mt-2">
                    <p class="text-[9px] uppercase text-stone-400 font-bold mb-1">Order Details</p>
                    <div class="space-y-1">
                        ${o.items.map(i => `
                            <div class="flex justify-between text-stone-700">
                                <span>${i.name} <span class="text-stone-400">(${i.size})</span></span>
                                <span>qty: ${i.qty}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="flex justify-between items-center border-t pt-2 mt-2 font-bold text-stone-900">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-normal text-stone-500">Payment: ${o.isPaid ? '✅ Verified' : '⏳ Pending'}</span>
                        ${o.isRefunded ? '<span class="text-red-500 text-[10px]">Status: Refund Processed</span>' : ''}
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] uppercase font-normal text-stone-400">Total Amount</p>
                        <p class="text-lg">৳${o.total}</p>
                    </div>
                </div>
            </div>`).join('');
    }

        // Inventory Management Logic (Unchanged)
        function handleSearch() {
            const q = document.getElementById('globalSearch').value.toLowerCase();
            filteredItems = inventory.filter(p => p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q));
            renderShop();
        }
        function setSeason(s) {
            document.querySelectorAll('.filter-link').forEach(l => l.classList.remove('active-filter'));
            document.getElementById(`f-${s}`).classList.add('active-filter');
            filteredItems = s === 'all' ? inventory : inventory.filter(p => p.season === s);
            renderShop();
        }
        function renderBrandMenu() {
            const brands = [...new Set(inventory.map(p => p.brand))].sort();
            document.getElementById('brand-menu').innerHTML = brands.map(b => `<li onclick="filterByBrand('${b}')" class="cursor-pointer hover:text-black">${b}</li>`).join('');
        }
        function filterByBrand(b) { filteredItems = inventory.filter(p => p.brand === b); renderShop(); }
        function renderAdminProducts() {
            const q = document.getElementById('inventorySearch')?.value.toLowerCase() || '';
            const filtered = inventory.filter(p => p.name.toLowerCase().includes(q));
            document.getElementById('admin-product-list').innerHTML = filtered.map(p => `<div class="flex justify-between bg-stone-50 p-2 border mb-1 text-[9px]"><span>${p.name}</span><button onclick="deleteProduct('${p.id}')" class="text-red-500 font-bold">DEL</button></div>`).join('');
        }
        async function updateOrder(oid, obj) { await _supabase.from('orders').update(obj).eq('orderID', oid); loadData(); }
        async function deleteOrder(oid) { if(confirm("Delete?")) { await _supabase.from('orders').delete().eq('orderID', oid); loadData(); } }
        async function deleteProduct(id) { if(confirm("Delete?")) { await _supabase.from('perfumes').delete().eq('id', id); loadData(); } }
        document.getElementById('pForm').onsubmit = async (e) => {
            e.preventDefault();
            const p = { id: "P-"+Date.now(), name: document.getElementById('name').value, brand: document.getElementById('brand').value, notes: document.getElementById('notes').value, season: document.getElementById('season').value, img: document.getElementById('imgUrl').value || 'https://via.placeholder.com/200', prices: { '1ml': document.getElementById('p1').value, '3ml': document.getElementById('p3').value, '5ml': document.getElementById('p5').value, '10ml': document.getElementById('p10').value, '15ml': document.getElementById('p15').value, '30ml': document.getElementById('p30').value } };
            await _supabase.from('perfumes').insert([p]); loadData(); e.target.reset();
        };
        document.getElementById('fileIn').onchange = async (e) => {
            const fd = new FormData(); fd.append('image', e.target.files[0]);
            const res = await fetch('https://api.imgbb.com/1/upload?key=73d04afd891df63c360b510165eb42f4', { method: 'POST', body: fd });
            const d = await res.json(); document.getElementById('imgUrl').value = d.data.url; alert("Image Ready");
        };

        // NAVIGATION
        function showSection(sec) {
            document.body.classList.remove('admin-mode', 'track-mode');
            if(sec === 'admin') document.body.classList.add('admin-mode');
            if(sec === 'track') { document.body.classList.add('track-mode'); renderCustomerOrders(); }
        }
        function attemptLogin() { if(document.getElementById('adm-user').value==='admin'&&document.getElementById('adm-pass').value==='ad123min'){showSection('admin');closeLogin();} else alert("Denied");}
        function openLogin() { document.getElementById('login-modal').classList.add('show'); }
        function closeLogin() { document.getElementById('login-modal').classList.remove('show'); }
        function resetShop() { showSection('shop'); filteredItems = inventory; renderShop(); }
        function toggleCart() { document.getElementById('custom-cart').classList.toggle('open'); }

        divs.forEach(d => document.getElementById('c-div').add(new Option(d, d)));
        dists.forEach(d => document.getElementById('c-dist').add(new Option(d, d)));
        window.onload = loadData;
    </script>
</body>
</html>
